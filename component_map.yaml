    port: null
    protocol: null
    data_access:
      reads: [PUBLIC]
      writes: []
      rationale: Config only reads configuration files — no access to classified data
    authority:
      domains: []
      rationale: Config is a utility, not an authority holder
    dependencies: []
    constraints: [C026, C030]

