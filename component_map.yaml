version: "2.0"
generated_by: constrain
system: ledger

components:
  - name: cli
    description: CLI entry point for human operators — init, register, validate, migrate, export, mock, serve, infer, builtins
    type: ingress
    port: null
    protocol: null
    data_access:
      reads: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      writes: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      rationale: CLI is the operator interface for all schema and migration operations — it can read and write all tiers through registry delegation
    authority:
      domains: [operator_interface]
      rationale: CLI is the single entry point for human operators
    dependencies: [registry, migration, propagation, export, mock, api, inference, builtins]
    constraints: []

  - name: registry
    description: Schema store, annotation index, and backend registry — stores schemas verbatim using unit/unit_type abstraction, validates annotations, enforces backend ownership exclusivity across all backend types
    type: library
    port: null
    protocol: null
    data_access:
      reads: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      writes: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      rationale: Registry stores all schemas regardless of tier — it must read all classifications to validate and index annotations
    authority:
      domains: [schema_storage, annotation_index, backend_registry]
      rationale: Single source of truth for schema definitions and field annotations
    dependencies: []
    constraints: [C001, C002, C003, C013, C017, C026, C027, C028, C031, C032]

  - name: migration
    description: Migration parser, diff engine, and blast radius calculator — analyzes SQL/Alembic/Flyway/Liquibase/CQL/Kafka schema evolution, computes gate decisions (BLOCKED/HUMAN_GATE/AUTO_PROCEED) for all mutable backend types
    type: library
    port: null
    protocol: null
    data_access:
      reads: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      writes: []
      rationale: Migration analysis reads schemas and annotations to compute blast radius — it never writes data, only produces analysis artifacts
    authority:
      domains: [migration_analysis, migration_gating, migration_approval]
      rationale: Owns all migration analysis and gating logic
    dependencies: [registry]
    constraints: [C004, C005, C006, C007, C016, C018, C023, C035, C036]

  - name: propagation
    description: Annotation propagation rules engine — maps annotations to control plane behaviors for Pact, Arbiter, Baton, and Sentinel using data-driven rule tables
    type: library
    port: null
    protocol: null
    data_access:
      reads: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      writes: []
      rationale: Reads annotations and classifications to compute propagation rules — produces export artifacts but does not modify schemas
    authority:
      domains: [annotation_rules, annotation_export]
      rationale: Owns the mapping from annotations to downstream tool behavior
    dependencies: [registry]
    constraints: [C003, C012, C020, C025]

  - name: export
    description: Export adapters for Pact, Arbiter, Baton, Sentinel, and retention — transforms propagation rules into tool-specific YAML formats including infrastructure retention requirements
    type: library
    port: null
    protocol: null
    data_access:
      reads: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      writes: []
      rationale: Reads schemas and propagation rules to produce export artifacts
    authority:
      domains: []
      rationale: Export adapters format data but do not own any domain — authority belongs to propagation
    dependencies: [registry, propagation]
    constraints: [C012, C014, C015, C019, C020, C025, C029, C037]

  - name: mock
    description: Schema-aware mock data generator — produces type-correct, tier-appropriate test data with canary fingerprinting for Arbiter taint tracking
    type: library
    port: null
    protocol: null
    data_access:
      reads: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      writes: []
      rationale: Reads schemas to generate mock data matching field types and classifications — writes nothing to the registry
    authority:
      domains: [mock_generation, canary_fingerprinting]
      rationale: Owns mock data generation and canary value creation
    dependencies: [registry]
    constraints: [C008, C009, C010, C011, C019, C021, C022]

  - name: api
    description: HTTP API server for Arbiter, Pact, Baton, and Sentinel integration — exposes registration, export, mock, and validation endpoints
    type: service
    port: 7701
