    dependencies: [registry, migration, propagation, export, mock, inference, builtins]
    constraints: [C010, C011, C019, C024]

  - name: inference
    description: Schema inference engine — introspects live backends to produce draft schemas for human review, supports postgres/mongodb/redis/kafka/s3/stripe via backend-specific drivers
    type: library
    port: null
    protocol: null
    data_access:
      reads: [PUBLIC, PII, FINANCIAL, AUTH, COMPLIANCE]
      writes: []
      rationale: Inference reads live backend structure which may expose field names and sample values across all tiers — it produces drafts but writes nothing to registry
    authority:
      domains: [schema_inference]
